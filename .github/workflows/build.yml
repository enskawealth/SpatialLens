name: Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper
        run: |
          cd SpatialLensClean
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Ensure gradle.properties exists
        run: |
          cd SpatialLensClean
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: SpatialLensClean

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: SpatialLensClean/app/build/outputs/apk/debug/app-debug.apk
